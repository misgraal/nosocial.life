<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#d9255e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NoSocial">
  <title>{% block title %}NoSocial FileShare{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/img/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/img/app-icon.svg">
  <link rel="preload" href="/static/css/styles.css?v=20260503-sessions" as="style">
  <link rel="stylesheet" href="/static/css/styles.css?v=20260503-sessions">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container full-bleed header-inner">
      <div style="display:flex;align-items:center;gap:12px;width:100%">
        <h1 class="logo">NoSocial FileShare</h1>
        <div style="flex:1"></div>
        {% block header_actions %}{% endblock %}
        <button id="theme-toggle" class="theme-switch" type="button" aria-pressed="false" aria-label="Toggle theme">
          <span class="theme-track">
            <span class="theme-option light">🌞</span>
            <span class="theme-option dark">🌙</span>
            <span class="theme-knob"></span>
          </span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="container full-bleed">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container full-bleed">© NoSocial FileShare</div>
  </footer>

  <script src="/static/js/main.js?v=20260503-sessions" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('/sw.js').catch(function(){});
      });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
