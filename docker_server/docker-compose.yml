services:
  mysql:
    image: mysql:8.4
    container_name: nosocial-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/misgraal/nosocial.life:latest
    container_name: nosocial-fastapi
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      NOSOCIAL_STORAGE_DIRS: /mnt/storage
      NOSOCIAL_TMP_FOLDER: temp
      NOSOCIAL_MEDIA_FOLDER: ${NOSOCIAL_MEDIA_FOLDER:-Movies}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /mnt/storage:/mnt/storage
      - app_runtime:/runtime

  dlna:
    image: ghcr.io/misgraal/nosocial.life:latest
    container_name: nosocial-dlna
    restart: unless-stopped
    network_mode: host
    command: ["minidlnad", "-d", "-f", "/etc/minidlna.conf"]
    volumes:
      - /mnt/storage:/media/storage:ro
      - ./minidlna.conf:/etc/minidlna.conf:ro
      - dlna_cache:/var/cache/minidlna

volumes:
  mysql_data:
  app_runtime:
  dlna_cache:
