services:
  mysql:
    image: mysql:8.4
    container_name: nosocial-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/misgraal/nosocial.life:latest
    container_name: nosocial-fastapi
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      NOSOCIAL_STORAGE_DIRS: /mnt/storage
      NOSOCIAL_TMP_FOLDER: temp
      NOSOCIAL_MEDIA_FOLDER: ${NOSOCIAL_MEDIA_FOLDER:-Movies}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /mnt/storage:/mnt/storage
      - app_runtime:/runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  dlna:
    image: ghcr.io/misgraal/nosocial.life:latest
    container_name: nosocial-dlna
    restart: unless-stopped
    network_mode: host
    command: ["/usr/sbin/minidlnad", "-d", "-f", "/etc/minidlna.conf"]
    volumes:
      - /mnt/storage:/media/storage:ro
      - ./minidlna.conf:/etc/minidlna.conf:ro
      - dlna_cache:/var/cache/minidlna
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/rootDesc.xml', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: nosocial-jellyfin
    restart: unless-stopped
    profiles:
      - jellyfin
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /mnt/storage/Movies:/media/Movies:ro
    environment:
      JELLYFIN_PublishedServerUrl: http://192.168.88.201:8096

  video-optimizer:
    image: ghcr.io/misgraal/nosocial.life:latest
    container_name: nosocial-video-optimizer
    profiles:
      - tools
    command: ["/bin/sh", "/opt/nosocial/optimize_videos.sh"]
    volumes:
      - /mnt/storage:/media/storage
      - ./optimize_videos.sh:/opt/nosocial/optimize_videos.sh:ro

volumes:
  mysql_data:
  app_runtime:
  dlna_cache:
  jellyfin_config:
  jellyfin_cache:
